<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>        
    <div class="wrapper">
        <span class="bg-animate"></span>
        <span class="bg-animate2"></span>
        <div class="form-box login">
            <h2 class="animation" style ="--i:0">Login</h2>
            <form action="#">
                <div class ="input-box animation" style ="--i:1">
                    <input type="text" required>
                    <label>Username</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box animation" style ="--i:2">
                    <input type="password" required>
                    <label>Password</label>
                    <i class='bx bxs-lock-alt'></i>

                </div>
                <a href="http://127.0.0.1:5500/project%20is%20big/dashboard/dashboard.html">
                <button type="button" class="btn animation" style ="--i:3" >Login</button></a>
                <div class="logreg-link animation" style ="--i:4">
                    <p>Don't have an account? <a href="#"class="register-link">Sign Up</a></p>

                </div>
            </form>
        </div>
        <div class="info-text login">
            <h2 class="animation" style="--i:0">Welcome Back!</h2>
            <p class="animation" style="--i:1">Event app manager help to guide you #<br>today is your day</p>
        </div>
        <div class="form-box register">
            <h2 class="animation" style="--i:17;--j:1">Sign Up</h2>
            <form action="#">
                <div class ="input-box animation" style="--i:18;--j:2">
                    <input type="text" required>
                    <label>Username</label>
                    <i class='bx bxs-user'></i>
                </div>
                 <div class ="input-box animation" style="--i:19;--j:3">
                    <input type="text" required>
                    <label>Email</label>
                   <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box animation" style="--i:20;--j:4">
                    <input type="password" required>
                    <label>Password</label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                
                 <a href="http://127.0.0.1:5500/project%20is%20big/dashboard/dashboard.html" method="get"><button type="button" class="btn animation" style="--i:21;--j:5">Login</button> </a>
                
                
                <div class="logreg-link animation" style="--i:22;--j:6">
                    <p>Already have an account? <a href="#"class="login-link">Login</a></p>

                </div>
            </form>
        </div>
         <div class="info-text register">
            <h2 class="animation" style="--i:17; --j:0" >Welcome!</h2>
            <p class="animation" style="--i:18; --j:1">Event app manager app helps to guides you #.<br>belive in your self you can do every thing</p>
        </div>
    </div>
    
    
    <script src="form.js"></script>
</body>
</html>
