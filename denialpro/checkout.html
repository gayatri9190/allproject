<!DOCTYPE html>
<html>
<head>
<title>ToyCarX - Checkout</title>
<link rel="stylesheet" href="style.css">

<style>
.checkout-container{
  max-width:800px;
  margin:50px auto;
  padding:30px;
  border:4px solid black;
  box-shadow:8px 8px 0 black;
  background:white;
}


.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:3px solid black;
  box-shadow:4px 4px 0 black;
}

.summary{
  border-top:3px solid black;
  margin-top:20px;
  padding-top:20px;
}

.total{
  font-size:22px;
  font-weight:bold;
}

.success-box{
  text-align:center;
  padding:60px;
}
</style>

</head>
<body>

<nav class="navbar">
  <div class="logo">BolzaanoCarX</div>
  <div class="theme-toggle" id="themeToggle">🌙</div>
</nav>

<div class="checkout-container" id="checkoutBox">

  <h2>Checkout</h2>

  <div id="productInfo"></div>

  <div class="row">
    <label>Quantity</label>
    <input type="number" id="qty" value="1" min="1">
  </div>

  <h3>Shipping Details</h3>

  <div class="row">
    <div style="width:48%">
      <label>Name</label>
      <input type="text" id="name">
    </div>
    <div style="width:48%">
      <label>Phone</label>
      <input type="text" id="phone">
    </div>
  </div>

  <div class="row">
    <label>Address</label>
    <input type="text" id="address">
  </div>

  <div class="summary">
    <p class="total" id="totalPrice"></p>
    <button class="btn" onclick="placeOrder()">Place Order</button>
  </div>

</div>

<script>
const item = JSON.parse(localStorage.getItem("buyNowItem"));
const qtyInput = document.getElementById("qty");

if(item){
  document.getElementById("productInfo").innerHTML =
    "<h3>"+item.name+"</h3><p>Price: ₹"+item.price+"</p>";
}

function updateTotal(){
  const qty = qtyInput.value;
  const total = item.price * qty;
  document.getElementById("totalPrice").innerText =
    "Total: ₹" + total;
}

qtyInput.addEventListener("input", updateTotal);
updateTotal();

function placeOrder(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const qty = qtyInput.value;

  if(!name || !phone || !address){
    alert("Please fill all details!");
    return;
  }

  const total = item.price * qty;

  document.getElementById("checkoutBox").innerHTML = `
    <div class="success-box">
      <h1>🎉 Order Confirmed!</h1>
      <p>Thank you, ${name} 🚗</p>
      <p>${item.name}</p>
      <p>Quantity: ${qty}</p>
      <h2>Total Paid: ₹${total}</h2>
      <a href="index.html" class="btn">Back to Home</a>
    </div>
  `;

  localStorage.removeItem("buyNowItem");
}

</script>
<script src="cart.js"></script>
</body>
</html
