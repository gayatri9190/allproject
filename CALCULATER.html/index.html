<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>faltu</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <div class="calculater">
            <form>
                <div class="display">
                    <input type="text" name="display">
                </div>
                <div >
                    <input type="button" class="color1" value="ac"onclick="display.value =' ' ">
                    
            <input type="button" class="color1" value="de"onclick="display.value = display.value.toString().slice(0,-1) ">
                      <input type="button" class="color1"  value="."onclick="display.value +='.' ">
                       <input type="button" class="color1" value="/"onclick="display.value +='/' ">
                </div>
                 <div >
                    <input type="button" class="color2" value="7"onclick="display.value +='7' ">
                     <input type="button" class="color2" value="8"onclick="display.value +='8' ">
                      <input type="button" class="color2" value="9"onclick="display.value +='9' ">
                       <input type="button" class="color2" value="*"onclick="display.value +='*' ">
                </div>
                 <div >
                    <input type="button" class="color3" value="4"onclick="display.value +='4' ">
                     <input type="button" class="color3" value="5"onclick="display.value +='5' ">
                      <input type="button" class="color3" value="6"onclick="display.value +='6' ">
                       <input type="button" class="color3" value="-"onclick="display.value +='-' ">
                </div>
                 <div >
                    <input type="button" class="color4" value="1"onclick="display.value +='1' ">
                     <input type="button" class="color4" value="2"onclick="display.value +='2' ">
                      <input type="button" class="color4" value="3"onclick="display.value +='3' ">
                       <input type="button" class="color4" value="+"onclick="display.value +='+' ">
                </div>
                 <div >
                    <input type="button" class="color5" value="00"onclick="display.value +='00' " >
                     <input type="button" class="color5" value="0"onclick="display.value +='0' ">
                <input type="button"  value="=" class="equal"onclick="display.value=eval(display.value) ">
                       
                </div>
            </form>
        </div>
    </div>
</body>
</html>
